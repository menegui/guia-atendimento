        /* Custom Utilities from index.css */

        .text-accent-light { color: #E8956A; }

        /* Arch Mask for Block 2 Hero */
        .arch-mask {
            border-radius: 200px 200px 24px 24px;
        }

        /* Hero bottom arch - fixed px so it stays round at any zoom */
        .hero-arch-bottom {

        }

            scrollbar-width: none;
        }

        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(28,26,23,0.12);
        }

            pointer-events: none;
            z-index: 9999;
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.7s ease forwards; }
        .delay-1 { animation-delay: 0.1s; opacity: 0; }
        .delay-2 { animation-delay: 0.25s; opacity: 0; }
        .delay-3 { animation-delay: 0.4s; opacity: 0; }

        /* Step Number for Block 2 Como Funciona */
        .step-num {
            font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;

            line-height: 1;

            font-style: italic;
            position: absolute;
            top: -1rem;
            left: 1.5rem;
            pointer-events: none;
            user-select: none;
        }

        /* Section Divider for Block 2 */
        .section-divider {
            width: 48px;
            height: 2px;
            background: #C8622A;
            margin: 1.25rem auto 0;
            border-radius: 99px;
        }

        /* ===== SCROLL REVEAL ANIMATIONS ===== */
        .reveal {
            opacity: 0;
            transform: translateY(32px);
            transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1), transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .reveal-left {
            opacity: 0;
            transform: translateX(-32px);
            transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1), transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal-left.visible {
            opacity: 1;
            transform: translateX(0);
        }
        .reveal-right {
            opacity: 0;
            transform: translateX(32px);
            transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1), transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal-right.visible {
            opacity: 1;
            transform: translateX(0);
        }
        .reveal-scale {
            opacity: 0;
            transform: scale(0.93);
            transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1), transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal-scale.visible {
            opacity: 1;
            transform: scale(1);
        }
        /* Staggered children */
        .stagger > *:nth-child(1) { transition-delay: 0s; }
        .stagger > *:nth-child(2) { transition-delay: 0.1s; }
        .stagger > *:nth-child(3) { transition-delay: 0.2s; }
        .stagger > *:nth-child(4) { transition-delay: 0.3s; }
        .stagger > *:nth-child(5) { transition-delay: 0.4s; }
        .stagger > *:nth-child(6) { transition-delay: 0.5s; }

                width: 100% !important;
                height: 100% !important;
                object-fit: cover !important;
                object-position: center top !important;
            }
        }

        /* Scroll indicator bounce */
        @keyframes bounceY {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(5px); }
        }
        .scroll-bounce {
            animation: bounceY 1.6s ease-in-out infinite;
        }

        .tag {

            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
    </style>
</head>

    <!-- Scroll Reveal Observer -->
    <script>
        function initScrollReveal() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

            // Observe sections and key elements
            const selectors = [
                'section',
                '.card-hover',
                '[data-reveal]',
            ];

            // Auto-apply reveal to major content blocks
            document.querySelectorAll('section').forEach((el, i) => {
                el.classList.add('reveal');
                observer.observe(el);
            });

            document.querySelectorAll('.card-hover').forEach((el, i) => {
                if (!el.closest('section') || true) {
                    el.classList.add('reveal');
                    el.style.transitionDelay = (i % 4) * 0.1 + 's';
                    observer.observe(el);
                }
            });

            // Observe grid children for staggered animation
            document.querySelectorAll('.grid').forEach(grid => {
                grid.classList.add('stagger');
                Array.from(grid.children).forEach((child, i) => {
                    child.classList.add('reveal');
                    observer.observe(child);
                });
            });
        }

        // Run after React renders
        setTimeout(initScrollReveal, 600);
        // Also re-run on any mutation (React may re-render)
        window.addEventListener('load', () => setTimeout(initScrollReveal, 800));
    </script>
